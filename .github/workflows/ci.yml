name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  backend:
    name: Backend lint & tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: talon
          POSTGRES_USER: talon
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U talon -d talon"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: talon
      DB_USER: talon
      DB_PASSWORD: test
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache backend virtualenv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: backend-venv-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            backend-venv-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up backend virtualenv
        working-directory: backend
        run: |
          if [ ! -d ".venv" ]; then
            python -m venv .venv
            .venv/bin/pip install --upgrade pip
            .venv/bin/pip install -e .[dev]
          fi

      - name: Ruff lint
        working-directory: backend
        run: |
          .venv/bin/ruff check app tests

      - name: Pyright type check
        working-directory: backend
        run: |
          .venv/bin/pyright app

      - name: Wait for PostgreSQL
        working-directory: backend
        run: |
          .venv/bin/python - << "PY"
          import asyncio

          import asyncpg


          async def wait_for_db() -> None:
            for attempt in range(30):
              try:
                conn = await asyncpg.connect(
                  user="talon",
                  password="test",
                  database="talon",
                  host="127.0.0.1",
                  port=5432,
                )
                await conn.close()
                print("Database is ready.")
                return
              except Exception as exc:  # noqa: BLE001
                print(f"Waiting for database (attempt {attempt + 1}/30): {exc}")
                await asyncio.sleep(2)
            raise SystemExit("Database did not become ready in time.")


          asyncio.run(wait_for_db())
          PY

      - name: Run database migrations
        working-directory: backend
        run: |
          .venv/bin/python -m alembic upgrade head

      - name: Run tests
        run: |
          make test

